<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frontend Slides Workflow Demo</title>
  <style>
    :root {
      --bg: radial-gradient(circle at 18% 12%, #1f375f 0, #0e1328 44%, #070911 100%);
      --panel: linear-gradient(155deg, rgba(255, 255, 255, 0.13), rgba(255, 255, 255, 0.05));
      --text: #eef3ff;
      --muted: #b9c5ef;
      --accent: #72e8ff;
      --accent-2: #b88cff;
      --line: rgba(255, 255, 255, 0.17);
      --shadow: 0 28px 60px rgba(0, 0, 0, 0.34);
      --slide-padding: clamp(28px, 4.3vw, 64px);
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #02040a;
      color: var(--text);
      font-family: "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
    }

    .deck {
      width: 100%;
      height: 100%;
      position: relative;
      isolation: isolate;
    }

    .slide {
      position: absolute;
      inset: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      padding: var(--slide-padding);
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: clamp(18px, 2.2vw, 30px);
      background: var(--bg);
      opacity: 0;
      transform: scale(0.985);
      pointer-events: none;
      transition: opacity 240ms ease, transform 260ms ease;
      overflow: hidden;
    }

    .slide.active {
      opacity: 1;
      transform: scale(1);
      pointer-events: auto;
    }

    .grain {
      position: absolute;
      inset: 0;
      z-index: -1;
      background-image: radial-gradient(rgba(255, 255, 255, 0.06) 0.6px, transparent 0.6px);
      background-size: 3px 3px;
      mix-blend-mode: soft-light;
      pointer-events: none;
      opacity: 0.3;
    }

    .halo {
      position: absolute;
      border-radius: 999px;
      filter: blur(70px);
      z-index: -1;
      pointer-events: none;
    }

    .halo.one {
      width: 35vw;
      aspect-ratio: 1;
      top: -10vw;
      right: -4vw;
      background: rgba(114, 232, 255, 0.32);
    }

    .halo.two {
      width: 28vw;
      aspect-ratio: 1;
      bottom: -11vw;
      left: -6vw;
      background: rgba(184, 140, 255, 0.25);
    }

    .topline {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: clamp(13px, 1.2vw, 16px);
      color: var(--muted);
      letter-spacing: 0.03em;
      text-transform: uppercase;
      gap: 16px;
    }

    .chip {
      border: 1px solid var(--line);
      background: rgba(8, 12, 25, 0.38);
      padding: 0.45rem 0.8rem;
      border-radius: 999px;
      font-size: 0.72em;
      font-weight: 700;
    }

    .content {
      min-height: 0;
      display: grid;
      align-content: center;
      gap: clamp(14px, 2vw, 24px);
    }

    .title {
      margin: 0;
      line-height: 1.04;
      font-size: clamp(2rem, 5vw, 4.5rem);
      letter-spacing: -0.03em;
      max-width: 15ch;
      text-wrap: balance;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: clamp(1rem, 1.7vw, 1.4rem);
      max-width: 62ch;
      line-height: 1.45;
    }

    .panel {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      overflow: hidden;
    }

    .list {
      margin: 0;
      padding: clamp(18px, 2.5vw, 34px);
      display: grid;
      gap: clamp(10px, 1.2vw, 15px);
    }

    .list li {
      list-style: none;
      position: relative;
      padding-left: 1.25em;
      line-height: 1.34;
      font-size: clamp(1rem, 1.7vw, 1.48rem);
      color: var(--text);
    }

    .list li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0.55em;
      width: 0.5em;
      height: 0.5em;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 0 0 2px rgba(114, 232, 255, 0.2);
    }

    .grid {
      display: grid;
      gap: clamp(14px, 1.5vw, 20px);
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .card {
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(12, 17, 35, 0.56);
      padding: clamp(16px, 2vw, 26px);
      display: grid;
      gap: 10px;
    }

    .card h3 {
      margin: 0;
      font-size: clamp(1.1rem, 2vw, 1.6rem);
    }

    .card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.4;
      font-size: clamp(0.95rem, 1.2vw, 1.1rem);
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--muted);
      font-size: clamp(0.8rem, 1vw, 1rem);
      border-top: 1px solid var(--line);
      padding-top: 12px;
      min-height: 32px;
    }

    .split-note {
      padding: 10px 0 0;
      font-size: 0.9em;
      color: var(--muted);
    }

    .controls {
      position: fixed;
      right: 18px;
      bottom: 18px;
      display: flex;
      align-items: center;
      gap: 9px;
      z-index: 20;
      background: rgba(9, 12, 24, 0.72);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px;
      backdrop-filter: blur(6px);
    }

    .controls button {
      border: 0;
      width: 38px;
      height: 38px;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 800;
      color: var(--text);
      background: linear-gradient(140deg, rgba(114, 232, 255, 0.3), rgba(184, 140, 255, 0.35));
      cursor: pointer;
    }

    .controls span {
      min-width: 68px;
      text-align: center;
      font-weight: 700;
      color: var(--muted);
      font-size: 0.86rem;
      letter-spacing: 0.02em;
    }

    .auto-split {
      min-height: 0;
      overflow: hidden;
      display: grid;
      gap: 12px;
      align-content: start;
    }

    @media (max-width: 860px) {
      .grid { grid-template-columns: 1fr; }
      .subtitle { max-width: none; }
      .controls { left: 18px; right: 18px; justify-content: center; }
    }
  </style>
</head>
<body>
  <main id="deck" class="deck" aria-live="polite"></main>
  <div class="controls">
    <button id="prev" aria-label="Previous slide">←</button>
    <span id="counter">1 / 1</span>
    <button id="next" aria-label="Next slide">→</button>
  </div>

  <script>
    const outline = [
      {
        type: "title",
        kicker: "Frontend Slides Workflow",
        title: "Reusable, single-file presentations for this repository",
        subtitle: "This deck is generated from a small outline object and rendered into polished fullscreen slides with automatic long-content splitting.",
        footer: "Demo • April 2026"
      },
      {
        type: "agenda",
        kicker: "Agenda",
        title: "What this workflow gives you",
        items: [
          "Author content in one lightweight structure.",
          "Generate one standalone HTML file with inline CSS and JavaScript.",
          "Keep every slide fullscreen with no internal scrolling.",
          "Split long sections into additional slides automatically.",
          "Reuse the same style and workflow for future decks."
        ]
      },
      {
        type: "content",
        kicker: "Workflow",
        title: "Authoring flow",
        subtitle: "Move from message to slides without building tools or bundling assets.",
        cards: [
          {
            title: "1) Outline",
            text: "Capture intent with short bullets, sections, and supporting notes."
          },
          {
            title: "2) Structure",
            text: "Map sections into title, list, and card-based slide types."
          },
          {
            title: "3) Compose",
            text: "Render a single HTML file using inline style and behavior only."
          },
          {
            title: "4) Validate",
            text: "Confirm no external dependencies, no overflow, and keyboard navigation works."
          }
        ]
      },
      {
        type: "content",
        kicker: "Design principles",
        title: "Distinctive and practical",
        subtitle: "A restrained sci-fi style with layered gradients, glass-like panels, and strong typography keeps decks modern without feeling generic.",
        items: [
          "Readable from a distance via large type scales and high contrast.",
          "Consistent layout primitives: topline, content block, footer.",
          "Subtle motion and texture for depth without distraction.",
          "Flexible containers for lists, cards, and narrative paragraphs."
        ]
      },
      {
        type: "long-list",
        kicker: "Auto split demonstration",
        title: "A long content section is split into multiple slides",
        intro: "The items below intentionally exceed one slide. The script paginates them across continuation slides while preserving style and readability.",
        items: [
          "Define a clear story spine before touching layout.",
          "Limit each bullet to one concise idea.",
          "Use strong action verbs in headings and bullets.",
          "Keep visual motifs consistent across the entire deck.",
          "Balance novelty with predictable navigation cues.",
          "Prefer short speaker notes over dense slide text.",
          "Use contrast to direct attention intentionally.",
          "Anchor each section with a memorable transition phrase.",
          "Check paragraph line lengths for projection readability.",
          "Ensure all interactions work from keyboard input.",
          "Provide continuation markers on split slides.",
          "Rehearse pacing against expected meeting duration.",
          "Validate color choices on dim projectors.",
          "Remove decorative elements that compete with content.",
          "Double-check terminology consistency across sections.",
          "Keep examples realistic and immediately relevant.",
          "Call out decisions, not just observations.",
          "End with clear next actions and ownership.",
          "Version decks in-repo so future updates stay auditable.",
          "Archive old decks while preserving shared templates."
        ]
      }
    ];

    const deck = document.getElementById("deck");
    const counter = document.getElementById("counter");
    const nextButton = document.getElementById("next");
    const prevButton = document.getElementById("prev");

    const staticChrome = () => `
      <div class="grain"></div>
      <div class="halo one"></div>
      <div class="halo two"></div>
    `;

    function baseSlide(data, footerText = "") {
      return `
        ${staticChrome()}
        <header class="topline">
          <span>${data.kicker || "Slide"}</span>
          <span class="chip">Single-file HTML</span>
        </header>
        <section class="content"></section>
        <footer class="footer">
          <span>${footerText}</span>
          <span class="page-number"></span>
        </footer>
      `;
    }

    function createSlideElement(data, footerText = "") {
      const slide = document.createElement("section");
      slide.className = "slide";
      slide.innerHTML = baseSlide(data, footerText);
      return slide;
    }

    function renderOutline() {
      const slides = [];

      outline.forEach((entry) => {
        if (entry.type === "title") {
          const slide = createSlideElement(entry, entry.footer || "");
          const content = slide.querySelector(".content");
          content.innerHTML = `
            <h1 class="title">${entry.title}</h1>
            <p class="subtitle">${entry.subtitle}</p>
          `;
          slides.push(slide);
          return;
        }

        if (entry.type === "agenda") {
          const slide = createSlideElement(entry, "Agenda");
          const content = slide.querySelector(".content");
          content.innerHTML = `
            <h2 class="title">${entry.title}</h2>
            <div class="panel">
              <ol class="list">
                ${entry.items.map((item) => `<li>${item}</li>`).join("")}
              </ol>
            </div>
          `;
          slides.push(slide);
          return;
        }

        if (entry.type === "content") {
          const slide = createSlideElement(entry, "Content");
          const content = slide.querySelector(".content");

          if (entry.cards) {
            content.innerHTML = `
              <h2 class="title">${entry.title}</h2>
              <p class="subtitle">${entry.subtitle || ""}</p>
              <div class="grid">
                ${entry.cards
                  .map(
                    (card) => `
                    <article class="card">
                      <h3>${card.title}</h3>
                      <p>${card.text}</p>
                    </article>`
                  )
                  .join("")}
              </div>
            `;
          } else {
            content.innerHTML = `
              <h2 class="title">${entry.title}</h2>
              <p class="subtitle">${entry.subtitle || ""}</p>
              <div class="panel">
                <ul class="list">
                  ${entry.items.map((item) => `<li>${item}</li>`).join("")}
                </ul>
              </div>
            `;
          }

          slides.push(slide);
          return;
        }

        if (entry.type === "long-list") {
          const slide = createSlideElement(entry, "Long content");
          const content = slide.querySelector(".content");
          content.innerHTML = `
            <h2 class="title">${entry.title}</h2>
            <p class="subtitle">${entry.intro || ""}</p>
            <div class="panel auto-split" data-split-source="${entry.title}"></div>
            <p class="split-note">This section auto-paginates when content exceeds one slide.</p>
          `;

          const splitRegion = slide.querySelector(".auto-split");
          entry.items.forEach((item) => {
            const node = document.createElement("div");
            node.className = "split-item card";
            node.innerHTML = `<p>${item}</p>`;
            splitRegion.appendChild(node);
          });

          slides.push(slide);
          return;
        }
      });

      slides.forEach((slide) => deck.appendChild(slide));
    }

    function splitOverflowSlides() {
      const initialSlides = Array.from(deck.querySelectorAll(".slide"));
      initialSlides.forEach((slide) => {
        const splitRegion = slide.querySelector(".auto-split");
        if (!splitRegion) return;

        const items = Array.from(splitRegion.children).map((child) => child.cloneNode(true));
        splitRegion.innerHTML = "";

        const continuationSlides = [slide];
        let activeSlide = slide;
        let activeRegion = splitRegion;

        const regionIsOverflowing = () => {
          const epsilon = 0.5;
          return activeRegion.scrollHeight > activeRegion.clientHeight + epsilon;
        };

        items.forEach((item, index) => {
          activeRegion.appendChild(item);

          if (regionIsOverflowing()) {
            activeRegion.removeChild(item);

            const continuation = createSlideElement(
              { kicker: `${slide.querySelector('.topline span').textContent} • Continued` },
              "Long content (continued)"
            );

            continuation.querySelector(".content").innerHTML = `
              <h2 class="title">${slide.querySelector('.title').textContent} <span style="color: var(--accent);">(cont.)</span></h2>
              <p class="subtitle">Automatic continuation created because one slide could not fit all content.</p>
              <div class="panel auto-split"></div>
              <p class="split-note">Continuation ${continuationSlides.length + 1}</p>
            `;

            deck.appendChild(continuation);
            continuationSlides.push(continuation);
            activeSlide = continuation;
            activeRegion = continuation.querySelector(".auto-split");
            activeRegion.appendChild(item);
          }

          if (index === items.length - 1 && activeRegion.children.length === 0) {
            const fallback = document.createElement("div");
            fallback.className = "split-item card";
            fallback.innerHTML = `<p>Content unavailable.</p>`;
            activeRegion.appendChild(fallback);
          }
        });
      });
    }

    let currentIndex = 0;

    function refreshSlides() {
      const slides = Array.from(deck.querySelectorAll(".slide"));
      slides.forEach((slide, index) => {
        slide.classList.toggle("active", index === currentIndex);
        const num = slide.querySelector(".page-number");
        if (num) num.textContent = `${index + 1} / ${slides.length}`;
      });
      counter.textContent = `${currentIndex + 1} / ${slides.length}`;
    }

    function nextSlide() {
      const slides = deck.querySelectorAll(".slide");
      currentIndex = Math.min(currentIndex + 1, slides.length - 1);
      refreshSlides();
    }

    function prevSlide() {
      currentIndex = Math.max(currentIndex - 1, 0);
      refreshSlides();
    }

    nextButton.addEventListener("click", nextSlide);
    prevButton.addEventListener("click", prevSlide);

    window.addEventListener("keydown", (event) => {
      if (["ArrowRight", "PageDown", " "].includes(event.key)) {
        event.preventDefault();
        nextSlide();
      }
      if (["ArrowLeft", "PageUp"].includes(event.key)) {
        event.preventDefault();
        prevSlide();
      }
      if (event.key.toLowerCase() === "home") {
        currentIndex = 0;
        refreshSlides();
      }
      if (event.key.toLowerCase() === "end") {
        currentIndex = deck.querySelectorAll(".slide").length - 1;
        refreshSlides();
      }
    });

    renderOutline();
    splitOverflowSlides();
    refreshSlides();
  </script>
</body>
</html>
